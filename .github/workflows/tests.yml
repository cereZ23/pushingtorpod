name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ─── Backend Tests ─────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: easm
          POSTGRES_PASSWORD: easm_password
          POSTGRES_DB: easm_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://easm:easm_password@localhost:5432/easm_test
      TEST_DATABASE_URL: postgresql://easm:easm_password@localhost:5432/easm_test
      REDIS_URL: redis://localhost:6379/0
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      MINIO_ENDPOINT: ""
      MINIO_USER: minioadmin
      MINIO_PASSWORD: minioadmin123
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      ENVIRONMENT: test
      JWT_SECRET_KEY: test-secret-key-for-ci
      JWT_ALGORITHM: HS256

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y postgresql-client

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run database migrations
      run: alembic upgrade head

    - name: Run unit tests
      run: |
        pytest tests/unit/ -v \
          --cov=app \
          --cov-report=xml \
          --cov-report=term-missing \
          --durations=20 \
          --timeout=120

    - name: Run standalone tests (no DB fixtures)
      run: |
        pytest \
          tests/test_correlation.py \
          tests/test_dedup.py \
          tests/test_h1_security.py \
          tests/test_models.py \
          tests/test_siem_export.py \
          tests/test_sprint02_security.py \
          -v --timeout=120 \
          -k "not test_security_comprehensive"
      # Excluded until P4-2 fixes stale mocks:
      # - test_ticketing.py (6 failures: stale mock paths)
      # - test_network_intel.py (3 failures: stale signatures)
      # - test_pipeline.py (1 failure: stale assertion)
      # - test_threat_intel.py (16 failures: missing matched_at column + stale mocks)

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      if: always()
      with:
        file: ./coverage.xml
        flags: backend
        fail_ci_if_error: false

  # ─── Frontend Tests ────────────────────────────────────────────
  frontend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Install dependencies
      run: pnpm install

    - name: Type check
      run: pnpm vue-tsc --noEmit

    - name: Lint
      run: pnpm lint --no-fix
      continue-on-error: true  # 83 errors to fix — tracked in P5

    - name: Run unit tests
      run: pnpm test

    - name: Build production bundle
      run: pnpm build

  # ─── Security Scan (informational — does not block deploy) ────
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install security tools
      run: pip install bandit safety

    - name: Bandit security scan
      run: bandit -r app/ -f json -o bandit-report.json -ll --exit-zero

    - name: Safety dependency check
      run: safety check --json > safety-report.json 2>&1 || true

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  # ─── Lint ──────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install linters
      run: pip install ruff

    - name: Ruff check
      run: ruff check app/ tests/ --output-format=github

    - name: Ruff format check
      run: ruff format --check app/ tests/

  # ─── Deploy to Production ──────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    # lint and security-scan run but don't block deploy (518 ruff errors to fix first)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy via rsync
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null

        rsync -avz --delete \
          --exclude '.git' \
          --exclude '__pycache__' \
          --exclude 'node_modules' \
          --exclude '.env' \
          --exclude 'keys/' \
          --exclude '*.pyc' \
          --exclude 'frontend/node_modules' \
          -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
          ./ root@${SERVER_HOST}:/opt/easm/

    - name: Rebuild and restart services
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
      run: |
        ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@${SERVER_HOST} \
          "cd /opt/easm && docker compose -f docker-compose.prod.yml build api ui worker && docker compose -f docker-compose.prod.yml up -d api ui worker beat"

    - name: Smoke test
      env:
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
      run: |
        echo "Waiting for services to start..."
        sleep 15

        FAILED=0

        # Health check
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${SERVER_HOST}/health" || echo "000")
        echo "Health check: HTTP $HTTP_CODE"
        if [ "$HTTP_CODE" != "200" ]; then
          echo "::error::Health check failed with HTTP $HTTP_CODE"
          FAILED=1
        fi

        # Frontend check
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://${SERVER_HOST}/" || echo "000")
        echo "Frontend check: HTTP $HTTP_CODE"
        if [ "$HTTP_CODE" != "200" ]; then
          echo "::error::Frontend check failed with HTTP $HTTP_CODE"
          FAILED=1
        fi

        if [ "$FAILED" -eq 1 ]; then
          echo "::error::Smoke tests FAILED — production may be unhealthy"
          exit 1
        fi

        echo "Smoke tests passed"

  # ─── Summary ───────────────────────────────────────────────────
  pipeline-summary:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, security-scan, lint]
    if: always()

    steps:
    - name: Pipeline results
      run: |
        echo "## Pipeline Summary" >> $GITHUB_STEP_SUMMARY
        echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Backend Tests | ${{ needs.backend-test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Frontend Tests | ${{ needs.frontend-test.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
