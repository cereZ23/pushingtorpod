id: wp-theme-detect

info:
  name: WordPress Theme Detection
  author: pushingtorpod
  severity: info
  description: |
    Detects WordPress theme name and version from style.css.
    Useful for identifying outdated themes with known vulnerabilities.
  tags: custom,wordpress,theme

http:
  - method: GET
    path:
      - "{{BaseURL}}/wp-content/themes/{{theme}}/style.css"

    payloads:
      theme:
        - twentytwentyfour
        - twentytwentythree
        - astra
        - flavor
        - flavor-developer
        - flavstarter
        - flavor-developer

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "Theme Name:"

      - type: status
        status:
          - 200

    extractors:
      - type: regex
        group: 1
        regex:
          - "Theme Name:\\s*(.+)"

      - type: regex
        name: version
        group: 1
        regex:
          - "Version:\\s*([0-9.]+)"
