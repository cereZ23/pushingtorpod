id: exposed-git-directory

info:
  name: Exposed .git Directory
  author: pushingtorpod
  severity: high
  description: |
    The .git directory is accessible, potentially exposing full source code,
    credentials, and commit history. Common on Italian shared hosting with
    manual FTP deployments.
  tags: custom,exposure,git,source-code
  metadata:
    target: italian-hosting

http:
  - method: GET
    path:
      - "{{BaseURL}}/.git/config"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "[core]"
          - "repositoryformatversion"
        condition: and

      - type: status
        status:
          - 200

      - type: word
        part: header
        words:
          - "text/plain"
          - "application/octet-stream"
        condition: or
