id: exposed-docker-compose-credentials

info:
  name: docker-compose.yml Exposed with Credentials
  author: pushingtorpod
  severity: critical
  description: |
    A docker-compose.yml file is publicly accessible and contains
    hardcoded credentials (passwords, API keys, database connection
    strings). This exposes the entire deployment configuration
    including service topology, port mappings, and secrets.
  impact: |
    An attacker can retrieve database credentials, internal service
    architecture, and volume mount paths, enabling direct database
    access or lateral movement.
  remediation: |
    Block access to docker-compose.yml via web server configuration.
    Rotate all exposed credentials immediately. Move secrets to
    environment files excluded from the web root.
  reference:
    - https://owasp.org/Top10/A01_2021-Broken_Access_Control/
    - https://cwe.mitre.org/data/definitions/540.html
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N
    cvss-score: 9.1
    cwe-id: CWE-540
  tags: exposure,config,credentials,docker,devops,misconfig

http:
  - method: GET
    path:
      - "{{BaseURL}}/docker-compose.yml"
      - "{{BaseURL}}/docker-compose.yaml"
      - "{{BaseURL}}/docker-compose.override.yml"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        part: body
        words:
          - "services:"
        condition: and

      - type: regex
        part: body
        regex:
          - "(?i)(password|secret|api.?key|access.?key|token)\\s*[:=]"

    extractors:
      - type: regex
        name: credentials
        group: 0
        regex:
          - "(?i)(password|secret|api.?key|access.?key|token)\\s*[:=]\\s*[\"']?([^\"'\\s]+)"
