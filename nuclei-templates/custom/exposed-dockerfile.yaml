id: exposed-dockerfile

info:
  name: Exposed Dockerfile
  author: pushingtorpod
  severity: medium
  description: |
    Dockerfile is publicly accessible, exposing base images, build steps,
    installed packages, environment variables, and internal paths.
    Can reveal infrastructure details useful for targeted attacks.
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:L/I:N/A:N
    cvss-score: 5.3
  tags: custom,exposure,docker,config
  metadata:
    target: web-applications

http:
  - method: GET
    path:
      - "{{BaseURL}}/Dockerfile"
      - "{{BaseURL}}/.Dockerfile"
      - "{{BaseURL}}/dockerfile"

    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "FROM "
          - "RUN "
        condition: and

      - type: status
        status:
          - 200

      - type: word
        part: header
        words:
          - "text/html"
        negative: true
