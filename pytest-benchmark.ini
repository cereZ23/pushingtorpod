[pytest-benchmark]
# pytest-benchmark configuration for EASM performance tests

# Disable benchmark on normal test runs (use --benchmark-only to run)
disable = false

# Enable histogram generation
histogram = true

# Save JSON results
json = true

# Display results
verbose = true

# Calibration
warmup = true
warmup_iterations = 3

# Minimum rounds
min_rounds = 5

# Maximum time per benchmark (seconds)
max_time = 60

# Statistics
stats = min,max,mean,median,stddev,rounds

# Compare against baseline
compare = mean:5%
compare_fail = mean:20%

# Grouping
group_by = group,param,func

# Sorting
sort = mean

# Histogram options
histogram_params = bins=20,color=blue,alpha=0.7

# Output directory
autosave = true

# Timer
timer = time.perf_counter
