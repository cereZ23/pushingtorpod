# =============================================================================
# EASM Platform - Production Docker Compose
# =============================================================================
# Usage:
#   1. Copy .env.production to .env and fill in secrets
#   2. docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

services:
  caddy:
    image: caddy:2-alpine
    container_name: easm-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      ui:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - easm-network

  postgres:
    image: postgres:15-alpine
    container_name: easm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: easm
      POSTGRES_USER: easm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Harden PostgreSQL
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # No ports exposed — internal only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easm"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - easm-network

  redis:
    image: redis:7.4-alpine
    container_name: easm-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
    # No ports exposed — internal only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - easm-network

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: easm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BROWSER: "off"  # Disable web console in production
    # No ports exposed — internal only
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - easm-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: easm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: easm
      POSTGRES_USER: easm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: RS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 15
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
      CORS_ORIGINS: '["https://easm.securekt.com"]'
      API_WORKERS: ${API_WORKERS:-2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      SENTRY_DSN: ${SENTRY_DSN:-}
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS_PER_MINUTE: 120
      RATE_LIMIT_REQUESTS_PER_HOUR: 3000
      SAML_FRONTEND_URL: https://easm.securekt.com
    # No ports exposed — Caddy handles external access
    volumes:
      - jwt-keys:/app/keys
      - ./data:/app/data:ro
      - ./alembic:/app/alembic
      - ./app:/app/app
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - easm-network

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: https://easm.securekt.com
    container_name: easm-ui
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # No ports exposed — Caddy handles external access
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - easm-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    # No container_name — allows `docker compose up --scale worker=N`
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    stop_grace_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: easm
      POSTGRES_USER: easm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
    volumes:
      - ./data:/app/data:ro
      - ./app:/app/app
      - ./alembic:/app/alembic
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --timeout=10 2>/dev/null | grep -q 'ok' || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4.0'
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - easm-network

  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: easm-beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=warning
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: easm
      POSTGRES_USER: easm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --timeout=10 2>/dev/null | grep -q 'ok' || exit 1"]
      interval: 60s
      timeout: 15s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - easm-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  jwt-keys:
  caddy_data:
  caddy_config:

networks:
  easm-network:
    driver: bridge
