# =============================================================================
# EASM Platform - Production Docker Compose
# =============================================================================
# Usage:
#   1. Copy .env.production to .env and fill in secrets
#   2. docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

services:
  # NOTE: Caddy runs on the host (not in Docker) to serve both EASM and CSPM.
  # Config: /etc/caddy/Caddyfile (managed separately)
  # API and UI expose ports to localhost for the host Caddy to reverse-proxy.

  postgres:
    image: postgres:15-alpine
    container_name: easm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: easm
      POSTGRES_USER: easm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Harden PostgreSQL
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # No ports exposed — internal only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U easm"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - easm-network

  redis:
    image: redis:7.4-alpine
    container_name: easm-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
    # No ports exposed — internal only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - easm-network

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: easm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BROWSER: "off"  # Disable web console in production
    # No ports exposed — internal only
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - easm-network

  api:
    image: ghcr.io/cerez23/pushingtorpod/api:latest
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: easm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: easm
      POSTGRES_USER: easm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: RS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 15
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
      CORS_ORIGINS: '["https://easm.securekt.com"]'
      API_WORKERS: ${API_WORKERS:-2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
      SENTRY_DSN: ${SENTRY_DSN:-}
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_REQUESTS_PER_MINUTE: 120
      RATE_LIMIT_REQUESTS_PER_HOUR: 3000
      SAML_FRONTEND_URL: https://easm.securekt.com
    ports:
      - "127.0.0.1:8002:8000"  # Host Caddy reverse-proxies to :8002
    volumes:
      - jwt-keys:/app/keys
      - ./data:/app/data:ro
      - ./alembic:/app/alembic
      - ./app:/app/app
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - easm-network

  ui:
    image: ghcr.io/cerez23/pushingtorpod/ui:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_BASE_URL: https://easm.securekt.com
    container_name: easm-ui
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3002:80"  # Host Caddy reverse-proxies to :3002
    # Override the Dockerfile healthcheck: the image uses `http://localhost:80/`
    # which busybox wget resolves to ::1 first, but nginx only listens IPv4 so
    # the probe gets Connection refused. Use 127.0.0.1 explicitly.
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - easm-network

  worker:
    image: ghcr.io/cerez23/pushingtorpod/worker:latest
    build:
      context: .
      dockerfile: Dockerfile.worker
    # No container_name — allows `docker compose up --scale worker=N`
    restart: unless-stopped
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    stop_grace_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: easm
      POSTGRES_USER: easm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: json
    volumes:
      - ./data:/app/data:ro
      - ./app:/app/app
      - ./alembic:/app/alembic
    # Check that the celery worker main process is alive. A broker-based
    # `inspect ping` is unreliable under heavy scan load (worker can't respond
    # to control messages within 15s when running long Nuclei/Naabu jobs),
    # which was flapping the container to unhealthy every scan. The `-x`
    # flag is required because celery runs under /opt/venv/bin/python so the
    # script name only appears when pidof also matches interpreted processes.
    healthcheck:
      test: ["CMD-SHELL", "pidof -x celery >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          # Tier 3 full-port scans run naabu + katana + chrome headless +
          # sensitive-paths httpx in parallel; 8G was too tight and the
          # cgroup OOM killer terminated the worker twice during scan 41,
          # forcing Celery to redeliver the task mid-pipeline. Host has
          # 16G RAM, so 12G leaves ~4G headroom for api/db/redis/minio.
          memory: 12G
          cpus: '4.0'
        reservations:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - easm-network

  beat:
    image: ghcr.io/cerez23/pushingtorpod/worker:latest
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: easm-beat
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=warning
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: easm
      POSTGRES_USER: easm
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      MFA_ENCRYPTION_KEY: ${MFA_ENCRYPTION_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    # Beat healthcheck: verify the scheduler is (a) alive and (b) making
    # progress by touching /app/celerybeat-schedule on every tick. We accept
    # the file as fresh if its mtime is within the last 10 minutes (the
    # default max scheduler interval is 5 min). `inspect ping` is not usable
    # here: beat has a 0.25 CPU limit and the celery CLI bootstrap alone is
    # slower than the 15s healthcheck timeout. `pidof -x` is required because
    # celery runs via python interpreter (see worker healthcheck comment).
    healthcheck:
      test: ["CMD-SHELL", "pidof -x celery >/dev/null 2>&1 && test -n \"$$(find /app/celerybeat-schedule -mmin -10 2>/dev/null)\" || exit 1"]
      interval: 60s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - easm-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  jwt-keys:

networks:
  easm-network:
    driver: bridge
